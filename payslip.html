<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payslip</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-bar button { padding: 8px 16px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #f5f5f5; }
        .print-button { background-color: #2196F3 !important; color: white !important; border: none !important; font-size: 14px; }
        .print-button:hover { background-color: #0b7dda !important; }
        .payslip-container { max-width: 800px; margin: 0 auto; border: 2px solid #333; padding: 30px; background-color: #fff; }
        .payslip-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 20px; }
        .payslip-header h1 { margin: 0; }
        .payslip-header p { margin: 5px 0; font-size: 14px; }
        .payslip-info { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 20px; gap: 20px; }
        .info-section h4 { margin: 0 0 10px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .info-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
        .payslip-section { margin-top: 30px; }
        .payslip-section h3 { background-color: #f2f2f2; padding: 10px; margin: 0; font-size: 14px; }
        .payslip-items { border: 1px solid #ddd; border-top: none; }
        .payslip-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; }
        .payslip-item:last-child { border-bottom: none; }
        .payslip-item.total { background-color: #f9f9f9; font-weight: bold; border-top: 2px solid #333; }
        .label { flex: 1; }
        .amount { text-align: right; width: 150px; }
        .net-pay-section { background-color: #e8f5e9; border: 2px solid #4CAF50; padding: 20px; margin-top: 30px; text-align: center; }
        .net-pay-section h2 { margin: 0; color: #4CAF50; font-size: 28px; }
        .net-pay-section p { margin: 6px 0 0 0; font-size: 13px; color: #555; }
        @media print {
            .top-bar { display: none; }
            body { padding: 0; }
            .payslip-container { border: none; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button onclick="window.location.href='payroll.html'">← Back to Payroll</button>
        <button class="print-button" onclick="window.print()">Print Payslip</button>
    </div>

    <div class="payslip-container">
        <div class="payslip-header">
            <h1>PAYSLIP</h1>
            <p>Human Resource Information System</p>
            <p id="payslip-period"></p>
        </div>

        <div class="payslip-info">
            <div class="info-section">
                <h4>Employee Information</h4>
                <div class="info-item"><span>Name:</span><span id="emp-name"></span></div>
                <div class="info-item"><span>Email:</span><span id="emp-email"></span></div>
                <div class="info-item"><span>Position:</span><span id="emp-position"></span></div>
                <div class="info-item"><span>Department:</span><span id="emp-department"></span></div>
            </div>
            <div class="info-section">
                <h4>Payroll Information</h4>
                <div class="info-item"><span>Payroll ID:</span><span id="payroll-id"></span></div>
                <div class="info-item"><span>Period:</span><span id="payroll-period"></span></div>
                <div class="info-item"><span>Basic Salary (semi-mo.):</span><span id="basic-salary"></span></div>
                <div class="info-item"><span>Total Hours Worked:</span><span id="total-hours"></span></div>
                <div class="info-item"><span>Gross Pay:</span><span id="gross-pay" style="font-weight:500;"></span></div>
            </div>
        </div>

        <div class="payslip-section">
            <h3>Allowances</h3>
            <div class="payslip-items" id="allowances-list"></div>
        </div>

        <div class="payslip-section">
            <h3>Deductions</h3>
            <div class="payslip-items" id="deductions-list"></div>
        </div>

        <div class="net-pay-section">
            <h2 id="net-pay-amount"></h2>
            <p>NET PAY THIS PERIOD</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const payrollId = urlParams.get('payroll_id');
            if (!payrollId) {
                document.body.innerHTML = '<div style="padding:40px;text-align:center;"><p>Invalid payroll ID. <a href="payroll.html">Go back to Payroll</a></p></div>';
                return;
            }
            await renderPayslip(payrollId);
        });
    </script>
</body>
</html>
