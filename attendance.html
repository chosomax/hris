<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIS - Attendance</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Human Resource Information System</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="employees.html">Employees</a>
            <a href="add-employee.html">Add Employee</a>
            <a href="attendance.html">Attendance</a>
            <a href="payroll.html">Payroll</a>
        </nav>
    </header>
    <main>
        <h2>Attendance Records</h2>
        
        <!-- Filter Controls -->
        <div id="filter-controls" style="margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <h3>Filter Records</h3>
            <label for="filter-employee">Employee:</label>
            <select id="filter-employee">
                <option value="">All Employees</option>
            </select>
            
            <label for="filter-date-from" style="margin-left: 20px;">From Date:</label>
            <input type="date" id="filter-date-from">
            
            <label for="filter-date-to" style="margin-left: 20px;">To Date:</label>
            <input type="date" id="filter-date-to">
            
            <button type="button" id="apply-filters" style="margin-left: 20px;">Apply Filters</button>
            <button type="button" id="clear-filters" style="margin-left: 10px;">Clear Filters</button>
        </div>
        
        <form id="attendance-form">
            <label for="employee-select">Employee:</label>
            <select id="employee-select" required>
                <option value="">Select an employee</option>
            </select>

            <label for="work-date">Date:</label>
            <input type="date" id="work-date" required>

            <label for="time-in">Time In:</label>
            <input type="time" id="time-in">

            <label for="time-out">Time Out:</label>
            <input type="time" id="time-out">

            <label for="status">Status:</label>
            <select id="status" required>
                <option value="PRESENT">PRESENT</option>
                <option value="LATE">LATE</option>
                <option value="ABSENT">ABSENT</option>
                <option value="ON LEAVE">ON LEAVE</option>
            </select>

            <label for="overtime-hours">Overtime Hours:</label>
            <input type="number" id="overtime-hours" min="0" step="0.25" value="0.00" required>

            <button type="submit">Add Attendance</button>
        </form>

        <table id="attendance-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Employee</th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Status</th>
                    <th>Overtime</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="attendance-list">
                <!-- Attendance records will be loaded here -->
            </tbody>
        </table>
    </main>
    <script src="js/app.js"></script>
</body>

</html>
