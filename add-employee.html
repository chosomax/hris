<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIS - Add Employee</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Human Resource Information System</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="employees.html">Employees</a>
            <a href="add-employee.html">Add Employee</a>
            <a href="attendance.html">Attendance</a>
            <a href="payroll.html">Payroll</a>
        </nav>
    </header>
    <main>
        <h2>Add New Employee</h2>
        <form id="add-employee-form">
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" required>
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" required pattern="[0-9+\- ]{7,20}" placeholder="09171234567">
            <label for="position">Position:</label>
            <select id="position" required>
                <option value="">Select a position</option>
            </select>
            <label for="department">Department:</label>
            <select id="department" required>
                <option value="">Select a department</option>
            </select>
            <label for="salary">Salary (₱):</label>
            <input type="number" id="salary" step="0.01" min="0.01" value="0.00" required>
            <label for="hourly-rate">Hourly Rate (₱):</label>
            <input type="text" id="hourly-rate" value="₱0.00" readonly>
            <label for="hire-date">Hire Date:</label>
            <input type="date" id="hire-date" required>
            <button type="submit">Add Employee</button>
        </form>
    </main>
    <script src="js/app.js"></script>
</body>

</html>
